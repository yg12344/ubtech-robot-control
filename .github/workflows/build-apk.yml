name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            autoconf \
            libtool \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            openjdk-11-jdk \
            python3-pil

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Create assets directory
      run: |
        mkdir -p assets
        # 创建临时占位图标
        python3 -c "from PIL import Image; img = Image.new('RGB', (512, 512), '#2C3E50'); img.save('assets/icon.png')"
        # 创建临时启动画面
        python3 -c "from PIL import Image, ImageDraw, ImageFont; img = Image.new('RGB', (1024, 1024), '#2C3E50'); d = ImageDraw.Draw(img); d.text((512, 512), 'UBTECH', fill='white', font_size=100, anchor='mm'); img.save('assets/presplash.png')"

    - name: Display buildozer version
      run: |
        buildozer --version

    - name: Build APK (Debug)
      run: |
        timeout 120m buildozer android debug || echo "Build completed with possible warnings"

    - name: Check if APK was built
      run: |
        find . -name "*.apk" -type f
        ls -lh bin/ 2>/dev/null || echo "No bin directory"

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ubtech-robot-control-debug-apk
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          .buildozer/
          buildozer.log
        retention-days: 7
        if-no-files-found: warn

    - name: Create summary
      if: success()
      run: |
        echo "## APK Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the APK from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
